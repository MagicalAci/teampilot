<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 900" font-family="SF Pro Text, PingFang SC, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1700" height="900" fill="#f1f5f9"/>
  <rect x="0" y="0" width="1700" height="76" fill="url(#headerBg)"/>
  <text x="36" y="47" fill="#ffffff" font-size="28" font-weight="700">Learning Loop</text>
  <text x="244" y="47" fill="#94a3b8" font-size="16">diagnose - learn - quiz - generate - review - return</text>

  <rect x="70" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#bae6fd" filter="url(#shadow)"/>
  <rect x="70" y="160" width="230" height="56" rx="22" fill="#06b6d4"/>
  <text x="95" y="196" fill="#ffffff" font-size="22" font-weight="700">1. Diagnose</text>
  <text x="95" y="254" fill="#334155" font-size="16">Input</text>
  <text x="95" y="281" fill="#64748b" font-size="14">goal, exam type, weak chapters,</text>
  <text x="95" y="304" fill="#64748b" font-size="14">time left, confidence level</text>
  <line x1="95" y1="334" x2="275" y2="334" stroke="#e2e8f0"/>
  <text x="95" y="372" fill="#334155" font-size="16">Output</text>
  <text x="95" y="399" fill="#64748b" font-size="14">recommended chapter pack or</text>
  <text x="95" y="422" fill="#64748b" font-size="14">targeted paper request</text>
  <line x1="95" y1="452" x2="275" y2="452" stroke="#e2e8f0"/>
  <text x="95" y="490" fill="#334155" font-size="16">Why it matters</text>
  <text x="95" y="517" fill="#64748b" font-size="14">the site should not feel like</text>
  <text x="95" y="540" fill="#64748b" font-size="14">a giant undirected question bank</text>

  <rect x="340" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#bfdbfe" filter="url(#shadow)"/>
  <rect x="340" y="160" width="230" height="56" rx="22" fill="#3b82f6"/>
  <text x="365" y="196" fill="#ffffff" font-size="22" font-weight="700">2. Learn Card</text>
  <text x="365" y="254" fill="#334155" font-size="16">Core object</text>
  <text x="365" y="281" fill="#64748b" font-size="14">one representative question with</text>
  <text x="365" y="304" fill="#64748b" font-size="14">method, source, and mistake notes</text>
  <line x1="365" y1="334" x2="545" y2="334" stroke="#e2e8f0"/>
  <text x="365" y="372" fill="#334155" font-size="16">User action</text>
  <text x="365" y="399" fill="#64748b" font-size="14">study the standard path instead of</text>
  <text x="365" y="422" fill="#64748b" font-size="14">watching a long generic lesson</text>
  <line x1="365" y1="452" x2="545" y2="452" stroke="#e2e8f0"/>
  <text x="365" y="490" fill="#334155" font-size="16">Product rule</text>
  <text x="365" y="517" fill="#64748b" font-size="14">every card must point to</text>
  <text x="365" y="540" fill="#64748b" font-size="14">knowledge, type, and checklist item</text>

  <rect x="610" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#ddd6fe" filter="url(#shadow)"/>
  <rect x="610" y="160" width="230" height="56" rx="22" fill="#8b5cf6"/>
  <text x="635" y="196" fill="#ffffff" font-size="22" font-weight="700">3. Micro Quiz</text>
  <text x="635" y="254" fill="#334155" font-size="16">After each card</text>
  <text x="635" y="281" fill="#64748b" font-size="14">1-3 near-transfer variations</text>
  <text x="635" y="304" fill="#64748b" font-size="14">to test immediate mastery</text>
  <line x1="635" y1="334" x2="815" y2="334" stroke="#e2e8f0"/>
  <text x="635" y="372" fill="#334155" font-size="16">Why not blank recall only</text>
  <text x="635" y="399" fill="#64748b" font-size="14">math learning benefits from</text>
  <text x="635" y="422" fill="#64748b" font-size="14">worked examples plus practice</text>
  <line x1="635" y1="452" x2="815" y2="452" stroke="#e2e8f0"/>
  <text x="635" y="490" fill="#334155" font-size="16">Decision</text>
  <text x="635" y="517" fill="#64748b" font-size="14">the loop should mix learn and test,</text>
  <text x="635" y="540" fill="#64748b" font-size="14">not force a pure exam mode first</text>

  <rect x="880" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#fde68a" filter="url(#shadow)"/>
  <rect x="880" y="160" width="230" height="56" rx="22" fill="#eab308"/>
  <text x="905" y="196" fill="#ffffff" font-size="22" font-weight="700">4. AI Practice</text>
  <text x="905" y="254" fill="#334155" font-size="16">Modes</text>
  <text x="905" y="281" fill="#64748b" font-size="14">mini set, chapter drill,</text>
  <text x="905" y="304" fill="#64748b" font-size="14">or full mock paper</text>
  <line x1="905" y1="334" x2="1085" y2="334" stroke="#e2e8f0"/>
  <text x="905" y="372" fill="#334155" font-size="16">Key promise</text>
  <text x="905" y="399" fill="#64748b" font-size="14">increase practice count without</text>
  <text x="905" y="422" fill="#64748b" font-size="14">burning the original true papers</text>
  <line x1="905" y1="452" x2="1085" y2="452" stroke="#e2e8f0"/>
  <text x="905" y="490" fill="#334155" font-size="16">Output</text>
  <text x="905" y="517" fill="#64748b" font-size="14">downloadable paper or online set</text>
  <text x="905" y="540" fill="#64748b" font-size="14">with answer and traceable tags</text>

  <rect x="1150" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#86efac" filter="url(#shadow)"/>
  <rect x="1150" y="160" width="230" height="56" rx="22" fill="#22c55e"/>
  <text x="1175" y="196" fill="#ffffff" font-size="22" font-weight="700">5. Review</text>
  <text x="1175" y="254" fill="#334155" font-size="16">Capture</text>
  <text x="1175" y="281" fill="#64748b" font-size="14">wrong questions, checklist items,</text>
  <text x="1175" y="304" fill="#64748b" font-size="14">chapter / type mastery changes</text>
  <line x1="1175" y1="334" x2="1355" y2="334" stroke="#e2e8f0"/>
  <text x="1175" y="372" fill="#334155" font-size="16">Core output</text>
  <text x="1175" y="399" fill="#64748b" font-size="14">a visible weak-point map and</text>
  <text x="1175" y="422" fill="#64748b" font-size="14">the next best action</text>
  <line x1="1175" y1="452" x2="1355" y2="452" stroke="#e2e8f0"/>
  <text x="1175" y="490" fill="#334155" font-size="16">Rule</text>
  <text x="1175" y="517" fill="#64748b" font-size="14">review is not storage only;</text>
  <text x="1175" y="540" fill="#64748b" font-size="14">it must drive the next task</text>

  <rect x="1420" y="160" width="230" height="470" rx="22" fill="url(#cardBg)" stroke="#fca5a5" filter="url(#shadow)"/>
  <rect x="1420" y="160" width="230" height="56" rx="22" fill="#ef4444"/>
  <text x="1445" y="196" fill="#ffffff" font-size="22" font-weight="700">6. Return Path</text>
  <text x="1445" y="254" fill="#334155" font-size="16">Mandatory link back</text>
  <text x="1445" y="281" fill="#64748b" font-size="14">every weak point should jump to</text>
  <text x="1445" y="304" fill="#64748b" font-size="14">a learning card or drill pack</text>
  <line x1="1445" y1="334" x2="1625" y2="334" stroke="#e2e8f0"/>
  <text x="1445" y="372" fill="#334155" font-size="16">Moat</text>
  <text x="1445" y="399" fill="#64748b" font-size="14">generated questions are useful only</text>
  <text x="1445" y="422" fill="#64748b" font-size="14">if they know what to teach next</text>
  <line x1="1445" y1="452" x2="1625" y2="452" stroke="#e2e8f0"/>
  <text x="1445" y="490" fill="#334155" font-size="16">Result</text>
  <text x="1445" y="517" fill="#64748b" font-size="14">diagnose - learn - practice becomes</text>
  <text x="1445" y="540" fill="#64748b" font-size="14">a repeatable weekly routine</text>

  <line x1="300" y1="395" x2="340" y2="395" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="395" x2="610" y2="395" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="840" y1="395" x2="880" y2="395" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1110" y1="395" x2="1150" y2="395" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1380" y1="395" x2="1420" y2="395" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M 1535 640 C 1535 760, 220 760, 220 640" fill="none" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="700" y="804" fill="#475569" font-size="18" font-weight="700">repeat with a smarter starting point next time</text>

  <rect x="60" y="834" width="1580" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="86" y="857" fill="#64748b" font-size="13">Design rule: the site wins when practice results always map back to what the learner should study next, not when it merely produces more questions.</text>
</svg>
