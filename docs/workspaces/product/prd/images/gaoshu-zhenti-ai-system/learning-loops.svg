<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 920"
     font-family="Avenir Next, PingFang SC, Microsoft YaHei, Helvetica Neue, sans-serif">
  <defs>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a22"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1600" height="920" fill="#f1f5f9"/>
  <circle cx="1450" cy="150" r="120" fill="#e0f2fe" opacity="0.5"/>
  <circle cx="170" cy="800" r="130" fill="#fef3c7" opacity="0.45"/>

  <rect x="0" y="0" width="1600" height="78" fill="url(#headerBg)"/>
  <text x="40" y="48" fill="#ffffff" font-size="28" font-weight="700">Learning Loops</text>
  <text x="250" y="48" fill="#94a3b8" font-size="16">Two loops that connect learning and practice</text>

  <text x="70" y="130" fill="#166534" font-size="22" font-weight="700">Loop A - Learn faster with real papers</text>
  <text x="70" y="158" fill="#64748b" font-size="15">This loop turns a few representative questions into a full study unit.</text>

  <line x1="270" y1="270" x2="315" y2="270" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="270" x2="565" y2="270" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="270" x2="815" y2="270" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1020" y1="270" x2="1065" y2="270" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1270" y1="270" x2="1315" y2="270" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(70,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#22c55e" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#22c55e" opacity="0.18"/>
    <text x="22" y="52" fill="#166534" font-size="18" font-weight="700">1. Choose pack</text>
    <text x="22" y="84" fill="#334155" font-size="14">Pick a high math pack by</text>
    <text x="22" y="106" fill="#334155" font-size="14">exam range, chapter or</text>
    <text x="22" y="128" fill="#334155" font-size="14">goal before the exam.</text>
  </g>

  <g transform="translate(320,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#22c55e" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#22c55e" opacity="0.18"/>
    <text x="22" y="52" fill="#166534" font-size="18" font-weight="700">2. Anchor question</text>
    <text x="22" y="84" fill="#334155" font-size="14">Start from a real paper item,</text>
    <text x="22" y="106" fill="#334155" font-size="14">see why it matters and what</text>
    <text x="22" y="128" fill="#334155" font-size="14">signals the method choice.</text>
  </g>

  <g transform="translate(570,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#06b6d4" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#06b6d4" opacity="0.18"/>
    <text x="22" y="52" fill="#0f766e" font-size="18" font-weight="700">3. Learn the move</text>
    <text x="22" y="84" fill="#334155" font-size="14">Read the compact lesson:</text>
    <text x="22" y="106" fill="#334155" font-size="14">core idea, standard method,</text>
    <text x="22" y="128" fill="#334155" font-size="14">common mistakes and traps.</text>
  </g>

  <g transform="translate(820,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#f97316" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#f97316" opacity="0.18"/>
    <text x="22" y="52" fill="#c2410c" font-size="18" font-weight="700">4. Practice variants</text>
    <text x="22" y="84" fill="#334155" font-size="14">Do 3-5 same-skill variants to</text>
    <text x="22" y="106" fill="#334155" font-size="14">prove the method transfers,</text>
    <text x="22" y="128" fill="#334155" font-size="14">not just the answer memory.</text>
  </g>

  <g transform="translate(1070,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#3b82f6" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#3b82f6" opacity="0.18"/>
    <text x="22" y="52" fill="#1d4ed8" font-size="18" font-weight="700">5. Take mini test</text>
    <text x="22" y="84" fill="#334155" font-size="14">Finish a short check with time</text>
    <text x="22" y="106" fill="#334155" font-size="14">pressure to see whether the</text>
    <text x="22" y="128" fill="#334155" font-size="14">skill is stable enough.</text>
  </g>

  <g transform="translate(1320,190)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#8b5cf6" opacity="0.18"/>
    <text x="22" y="52" fill="#7c3aed" font-size="18" font-weight="700">6. Finish checklist</text>
    <text x="22" y="84" fill="#334155" font-size="14">Mark the pack as ready and</text>
    <text x="22" y="106" fill="#334155" font-size="14">unlock a same-topic retry</text>
    <text x="22" y="128" fill="#334155" font-size="14">paper for extra practice.</text>
  </g>

  <text x="70" y="470" fill="#1d4ed8" font-size="22" font-weight="700">Loop B - Practice more without wasting real papers</text>
  <text x="70" y="498" fill="#64748b" font-size="15">This loop uses AI papers as an extension layer, then sends users back to the right anchor questions.</text>

  <line x1="270" y1="610" x2="315" y2="610" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="610" x2="565" y2="610" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="610" x2="815" y2="610" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1020" y1="610" x2="1065" y2="610" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1270" y1="610" x2="1315" y2="610" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(70,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#3b82f6" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#3b82f6" opacity="0.18"/>
    <text x="22" y="52" fill="#1d4ed8" font-size="18" font-weight="700">1. Choose goal</text>
    <text x="22" y="84" fill="#334155" font-size="14">Pick standard mock, chapter</text>
    <text x="22" y="106" fill="#334155" font-size="14">drill, weakness retry or a</text>
    <text x="22" y="128" fill="#334155" font-size="14">short sprint paper.</text>
  </g>

  <g transform="translate(320,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#3b82f6" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#3b82f6" opacity="0.18"/>
    <text x="22" y="52" fill="#1d4ed8" font-size="18" font-weight="700">2. Generate paper</text>
    <text x="22" y="84" fill="#334155" font-size="14">Build a paper from tagged</text>
    <text x="22" y="106" fill="#334155" font-size="14">prototypes instead of fully</text>
    <text x="22" y="128" fill="#334155" font-size="14">detached AI questions.</text>
  </g>

  <g transform="translate(570,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#06b6d4" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#06b6d4" opacity="0.18"/>
    <text x="22" y="52" fill="#0f766e" font-size="18" font-weight="700">3. Timed practice</text>
    <text x="22" y="84" fill="#334155" font-size="14">Do the paper online or as a</text>
    <text x="22" y="106" fill="#334155" font-size="14">downloadable mock under a</text>
    <text x="22" y="128" fill="#334155" font-size="14">clear time limit.</text>
  </g>

  <g transform="translate(820,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#f97316" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#f97316" opacity="0.18"/>
    <text x="22" y="52" fill="#c2410c" font-size="18" font-weight="700">4. AI review</text>
    <text x="22" y="84" fill="#334155" font-size="14">Show weak topics, mistake</text>
    <text x="22" y="106" fill="#334155" font-size="14">types and which skills are still</text>
    <text x="22" y="128" fill="#334155" font-size="14">not stable enough.</text>
  </g>

  <g transform="translate(1070,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#8b5cf6" opacity="0.18"/>
    <text x="22" y="52" fill="#7c3aed" font-size="18" font-weight="700">5. Jump back</text>
    <text x="22" y="84" fill="#334155" font-size="14">Open the right anchor question,</text>
    <text x="22" y="106" fill="#334155" font-size="14">mini lesson or checklist item</text>
    <text x="22" y="128" fill="#334155" font-size="14">behind each weak area.</text>
  </g>

  <g transform="translate(1320,530)" filter="url(#shadow)">
    <rect width="200" height="160" rx="22" fill="url(#cardBg)" stroke="#22c55e" stroke-width="2"/>
    <rect width="200" height="16" rx="22" fill="#22c55e" opacity="0.18"/>
    <text x="22" y="52" fill="#166534" font-size="18" font-weight="700">6. Retry better</text>
    <text x="22" y="84" fill="#334155" font-size="14">Generate a smaller targeted</text>
    <text x="22" y="106" fill="#334155" font-size="14">paper and repeat until the</text>
    <text x="22" y="128" fill="#334155" font-size="14">weakness map improves.</text>
  </g>

  <g transform="translate(70,760)" filter="url(#shadow)">
    <rect width="1460" height="108" rx="20" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <text x="28" y="40" fill="#1e293b" font-size="18" font-weight="700">Design rule</text>
    <text x="28" y="72" fill="#334155" font-size="15">Every AI paper item should keep a visible prototype link, a topic tag and a clear path back to the relevant anchor question.</text>
    <text x="28" y="92" fill="#64748b" font-size="13">This keeps user trust high and stops the product from becoming just another generic AI question bank.</text>
  </g>
</svg>
